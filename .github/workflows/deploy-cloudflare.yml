name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read

env:
  BUILD_PATH: "./src/vue"

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore wasm-tools workload
        run: dotnet workload restore
      - name: Publish BrowserWasm
        run: dotnet publish src/BrowserWasm/BrowserWasm.csproj -c Release
      - name: Copy WASM assets into Vue public
        run: |
          rm -rf "$BUILD_PATH/public/_framework"
          cp -r src/BrowserWasm/bin/Release/net8.0/browser-wasm/AppBundle/_framework \
                "$BUILD_PATH/public/"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: ${{ env.BUILD_PATH }}/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: ${{ env.BUILD_PATH }}
      - name: Build
        run: npm run build
        working-directory: ${{ env.BUILD_PATH }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ env.BUILD_PATH }}/dist --project-name=factoriotools
